name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  byte-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: ['27.1', '28.2', '29.4', '30.1', 'snapshot']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Byte-compile shared library
        run: |
          emacs --batch -L . \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile tokyo-night.el
      - name: Load all themes
        run: |
          emacs --batch -L . \
            -l tokyo-night-theme.el \
            -l tokyo-night-storm-theme.el \
            -l tokyo-night-moon-theme.el \
            -l tokyo-night-day-theme.el

  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.emacs-version == 'snapshot' }}
    strategy:
      matrix:
        emacs-version: ['27.2', '28.2', '29.4', '30.1', 'snapshot']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Install Eldev
        run: curl -fsSL https://raw.github.com/doublep/eldev/master/webinstall/github-eldev | sh
      - name: Run tests
        run: |
          eldev -dtT buttercup
